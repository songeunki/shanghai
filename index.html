  function buildPrintReport() {
    var total = receipts.reduce(function (s, r) { return s + (Number(r.amount) || 0); }, 0);
    var totalKrw = receipts.reduce(function (s, r) { return s + Math.round((Number(r.amount) || 0) * rcptRate(r)); }, 0);
    var now = new Date();
    var today = now.getFullYear() + "." + ("0" + (now.getMonth() + 1)).slice(-2) + "." + ("0" + now.getDate()).slice(-2);
    function dt(ms) { var d = new Date(ms), p = function (n) { return ("0" + n).slice(-2); }; return d.getFullYear() + "." + p(d.getMonth() + 1) + "." + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes()); }

    // 결제 카드별 그룹화
    var groups = {};
    function grp(id) {
      var key = id || "none";
      if (!groups[key]) {
        var c = CARDS.filter(function (x) { return x.id === id; })[0];
        groups[key] = { name: c ? cardLabel(id) : "미지정", kind: c ? (c.kind || "기타") : "미지정", items: [], yuan: 0, krw: 0 };
      }
      return groups[key];
    }
    receipts.slice().sort(function (a, b) { return paidOf(a) - paidOf(b); }).forEach(function (r) {
      var g = grp(r.card); g.items.push(r); g.yuan += Number(r.amount) || 0; g.krw += Math.round((Number(r.amount) || 0) * rcptRate(r));
    });
    var ordered = [];
    CARDS.forEach(function (c) { if (groups[c.id]) ordered.push(groups[c.id]); });
    if (groups["none"]) ordered.push(groups["none"]);

    var personalYuan = 0, personalKrw = 0;
    ordered.forEach(function (g) { if (g.kind === "개인") { personalYuan += g.yuan; personalKrw += g.krw; } });

    var h = '<div class="pr-doc">';
    h += '<div class="pr-head"><div class="pr-kicker">CORPORATE TRIP · SHANGHAI</div><h1>상해 전시회 경비 내역서</h1>'
      + '<div class="pr-sub">수·목·금·토 (4일) · 9개 방 18명 &nbsp;|&nbsp; 작성일 ' + today + '</div></div>';

    h += '<table class="pr-sum"><tr><th>총 지출(위안)</th><th>원화 환산(건별 환율 합산)</th><th>건수</th></tr>'
      + '<tr><td>¥' + fmt(total) + '</td><td>₩' + totalKrw.toLocaleString("ko-KR") + '</td><td>' + receipts.length + '건</td></tr></table>';

    // 개인 카드 환급 강조
    if (personalYuan > 0) {
      h += '<div class="pr-reimburse"><b>개인 카드 결제 — 회사 지급(환급) 대상</b><span>₩' + personalKrw.toLocaleString("ko-KR") + '&nbsp; (¥' + fmt(personalYuan) + ')</span></div>';
    } else {
      h += '<div class="pr-reimburse none">개인 카드 결제 내역 없음 (환급 대상 없음)</div>';
    }

    // 카드별 합계 표
    h += '<table class="pr-tbl"><thead><tr><th>결제 카드</th><th>구분</th><th class="r">건수</th><th class="r">금액(¥)</th><th class="r">금액(₩)</th></tr></thead><tbody>';
    ordered.forEach(function (g) {
      h += '<tr' + (g.kind === "개인" ? ' class="pr-row-personal"' : '') + '><td>' + esc(g.name) + '</td><td>' + g.kind + (g.kind === "개인" ? " (환급)" : "") + '</td><td class="r">' + g.items.length + '</td><td class="r">¥' + fmt(g.yuan) + '</td><td class="r">₩' + g.krw.toLocaleString("ko-KR") + '</td></tr>';
    });
    h += '<tr class="pr-total"><td colspan="2">합계</td><td class="r">' + receipts.length + '</td><td class="r">¥' + fmt(total) + '</td><td class="r">₩' + totalKrw.toLocaleString("ko-KR") + '</td></tr></tbody></table>';

    // 일자별 그룹화
    var dmap = {};
    receipts.slice().sort(function (a, b) { return paidOf(a) - paidOf(b); }).forEach(function (r) {
      var k = ymd(paidOf(r));
      if (!dmap[k]) dmap[k] = { items: [], yuan: 0, krw: 0 };
      dmap[k].items.push(r); dmap[k].yuan += Number(r.amount) || 0; dmap[k].krw += Math.round((Number(r.amount) || 0) * rcptRate(r));
    });
    var dates = Object.keys(dmap).sort();
    function dlabel(k) { var pp = k.split("-"); var dd = new Date(+pp[0], +pp[1] - 1, +pp[2]); var wd = ["일", "월", "화", "수", "목", "금", "토"][dd.getDay()]; return pp[0] + "." + pp[1] + "." + pp[2] + " (" + wd + ")"; }
    function hm(ms) { var d = new Date(ms), p = function (n) { return ("0" + n).slice(-2); }; return p(d.getHours()) + ":" + p(d.getMinutes()); }
    function kindOf(r) { var c = r.card ? (CARDS.filter(function (x) { return x.id === r.card; })[0] || null) : null; return c ? (c.kind || "기타") : (r.card ? "기타" : "미지정"); }

    // 일자별 합계 표
    h += '<div class="pr-sec2">일자별 사용금액</div>';
    h += '<table class="pr-tbl"><thead><tr><th>일자</th><th class="r">건수</th><th class="r">금액(¥)</th><th class="r">금액(₩)</th></tr></thead><tbody>';
    dates.forEach(function (k) {
      var g = dmap[k];
      h += '<tr><td>' + dlabel(k) + '</td><td class="r">' + g.items.length + '</td><td class="r">¥' + fmt(g.yuan) + '</td><td class="r">₩' + g.krw.toLocaleString("ko-KR") + '</td></tr>';
    });
    h += '<tr class="pr-total"><td>합계</td><td class="r">' + receipts.length + '</td><td class="r">¥' + fmt(total) + '</td><td class="r">₩' + totalKrw.toLocaleString("ko-KR") + '</td></tr></tbody></table>';

    // 일자별 상세 내역
    dates.forEach(function (k) {
      var g = dmap[k];
      h += '<div class="pr-sec">■ ' + dlabel(k) + ' &nbsp;—&nbsp; ' + g.items.length + '건 · ¥' + fmt(g.yuan) + ' / ₩' + g.krw.toLocaleString("ko-KR") + '</div>';
      h += '<table class="pr-tbl"><thead><tr><th>No</th><th>시각</th><th>용도</th><th>세부 내역</th><th>카드</th><th>구분</th><th>결제자</th><th class="r">금액(¥)</th><th class="r">환율</th><th class="r">금액(₩)</th></tr></thead><tbody>';
      g.items.forEach(function (r, i) {
        var rt = rcptRate(r); var kind = kindOf(r);
        h += '<tr' + (kind === "개인" ? ' class="pr-row-personal"' : '') + '><td>' + (i + 1) + '</td><td>' + hm(paidOf(r)) + '</td><td>' + esc(r.purpose || "") + '</td><td>' + esc(r.detail || "") + '</td><td>' + esc(r.card ? cardLabel(r.card) : "") + '</td><td>' + kind + '</td><td>' + esc(r.payer || "") + '</td>'
          + '<td class="r">' + fmt(r.amount) + '</td><td class="r">' + rateStr(rt) + '</td><td class="r">' + Math.round((Number(r.amount) || 0) * rt).toLocaleString("ko-KR") + '</td></tr>';
      });
      h += '<tr class="pr-total"><td colspan="7">소계</td><td class="r">¥' + fmt(g.yuan) + '</td><td class="r"></td><td class="r">₩' + g.krw.toLocaleString("ko-KR") + '</td></tr></tbody></table>';
    });

    // 첨부 증빙 (일자별)
    h += '<div class="pr-evi-title">첨부 증빙 (영수증 사진)</div>';
    dates.forEach(function (k) {
      dmap[k].items.forEach(function (r) {
        var imgs = getImgs(r); var kk = kindOf(r);
        h += '<div class="pr-evi"><div class="pr-evi-h">[' + dlabel(k) + ' · ' + esc(r.card ? cardLabel(r.card) : "미지정") + (kk === "개인" ? " · 환급" : "") + '] ' + esc(r.purpose || "") + ' · ¥' + fmt(r.amount) + ' · ' + hm(paidOf(r)) + '</div><div class="pr-evi-imgs">';
        imgs.forEach(function (u) { h += '<img src="' + u + '" />'; });
        h += '</div></div>';
      });
    });
    h += '</div>';
    return h;
  }
  function exportPdf() {
    var area = document.getElementById("printArea");
    if (!area) return;
    area.innerHTML = buildPrintReport();
    var oldTitle = document.title;
    document.title = "상해전시회_경비내역서_" + ymd(Date.now());
    var restore = function () { document.title = oldTitle; window.removeEventListener("afterprint", restore); };
    window.addEventListener("afterprint", restore);
    setTimeout(function () { window.print(); }, 200);
  }

  /* ---- 이벤트 ---- */
  document.getElementById("root").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-act]"); if (!btn) return;
    var act = btn.getAttribute("data-act"), cp = btn.getAttribute("data-cp");
    if (act === "mode") { ui.mode = btn.getAttribute("data-mode"); ui.adding = false; ui.rcptAdding = false; render(); }
    else if (act === "day") { ui.activeDay = btn.getAttribute("data-day"); ui.openCp = null; ui.adding = false; render(); }
    else if (act === "open") { ui.openCp = (ui.openCp === cp ? null : cp); render(); }
    else if (act === "toggle") { toggle(ui.activeDay, cp, btn.getAttribute("data-name")); }
    else if (act === "all") { setAll(ui.activeDay, cp, true); }
    else if (act === "clear") { setAll(ui.activeDay, cp, false); }
    else if (act === "move") { moveCp(ui.activeDay, cp, parseInt(btn.getAttribute("data-dir"), 10)); }
    else if (act === "remove") { removeCp(ui.activeDay, cp); }
    else if (act === "add-open") { ui.adding = true; render(); }
    else if (act === "add-cancel") { ui.adding = false; render(); }
    else if (act === "add-submit") { var i = document.getElementById("addInput"); addCp(i ? i.value : ""); }
    else if (act === "rcpt-add") { tempImgs = []; ui.editingId = null; ui.detailId = null; ui.rcptAdding = true; render(); prefillRate(); }
    else if (act === "edit") { var eid = btn.getAttribute("data-id"); var er = receipts.filter(function (x) { return x.id === eid; })[0]; if (er) { ui.editingId = eid; ui.detailId = null; ui.rcptAdding = false; tempImgs = getImgs(er).slice(); render(); } }
    else if (act === "rcpt-cancel") { tempImgs = []; ui.rcptAdding = false; ui.editingId = null; render(); }
    else if (act === "rcpt-submit") { submitReceipt(); }
    else if (act === "rcpt-del") { ui.deleteId = btn.getAttribute("data-id"); ui.delErr = false; render(); }
    else if (act === "del-cancel") { ui.deleteId = null; ui.delErr = false; render(); }
    else if (act === "del-confirm") { var pwEl = document.getElementById("delPw"); var pw = pwEl ? pwEl.value : ""; if (pw === DELETE_PW) { var did = ui.deleteId; ui.deleteId = null; ui.delErr = false; ui.detailId = null; deleteReceipt(did); } else { ui.delErr = true; render(); } }
    else if (act === "detail") { ui.detailId = btn.getAttribute("data-id"); render(); }
    else if (act === "detail-close") { ui.detailId = null; render(); }
    else if (act === "view") { var id = btn.getAttribute("data-img"); var r = receipts.filter(function (x) { return x.id === id; })[0]; if (r) { ui.modalImgs = getImgs(r); render(); } }
    else if (act === "modal-close") { ui.modalImgs = null; render(); }
    else if (act === "export-pdf") { exportPdf(); }
  });
  document.getElementById("root").addEventListener("change", function (e) {
    if (e.target && e.target.id === "rateInput") {
      var v = parseFloat(e.target.value);
      if (v > 0) { rate = v; try { localStorage.setItem(RATE_KEY, String(v)); } catch (er) {} if (data) { data.rate = v; persistRate(v); } render(); }
    }
  });

  /* ---- 저장소 초기화 ---- */
  function initLocal() {
    useServer = false;
    openDB(function () { idbAll(function (list) { receipts = list || []; receiptsLoaded = true; render(); }); });
  }
  function initStorage() {
    var c = FIREBASE_CONFIG;
    var ok = c && c.apiKey && c.projectId && c.apiKey.indexOf("여기에") === -1 && c.projectId.indexOf("여기에") === -1;
    if (!ok) { initLocal(); return; }
    Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
    ]).then(function (mods) {
      var appMod = mods[0], fs = mods[1];
      var app = appMod.initializeApp(c);
      var db = fs.getFirestore(app);
      try { fs.enableIndexedDbPersistence(db).catch(function () {}); } catch (e) {}
      fb.fs = fs; fb.db = db; fb.rollcallRef = fs.doc(db, "trip", "rollcall");
      useServer = true;
      data = buildInitial(); // 서버 모드에선 로컬 캐시값을 신뢰하지 않고 서버 스냅샷을 기다림
      var seeded = false;
      fs.onSnapshot(fb.rollcallRef, function (snap) {
        var fromCache = snap.metadata && snap.metadata.fromCache;
        if (snap.exists()) {
          var d = snap.data();
          if (d && d.checkpoints) { data = d; if (d.rate) rate = d.rate; render(); }
        } else if (!fromCache && !seeded) {
          // 서버가 '문서 없음'을 확정했을 때만 최초 1회 생성 (빈 캐시로는 절대 덮어쓰지 않음)
          seeded = true; var init = buildInitial(); init.rate = rate; fs.setDoc(fb.rollcallRef, init);
        }
      }, function (err) { console.error(err); });
      fs.onSnapshot(fs.collection(db, "receipts"), function (snap) {
        var arr = []; snap.forEach(function (x) { arr.push(x.data()); });
        receipts = arr; receiptsLoaded = true; render();
      }, function () { receiptsLoaded = true; render(); });
      render();
    }).catch(function (e) { console.error("Firebase 연결 실패 → 로컬 저장으로 동작합니다.", e); initLocal(); });
  }

  render();
  initStorage();
})();
</script>
</body>
</html>
